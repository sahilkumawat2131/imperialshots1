<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Theme Selector</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f4f4;
padding:30px;
transition:0.3s;
}

.container{
max-width:500px;
margin:auto;
}

.box{
background:#fff;
padding:22px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{margin-bottom:12px}

/* THEME */

.theme-grid{
display:flex;
gap:10px;
}

.theme-btn{
width:40px;
height:40px;
border-radius:50%;
border:none;
cursor:pointer;
position:relative;
}

.theme-btn span{
position:absolute;
top:-5px;
right:-5px;
background:#fff;
border-radius:50%;
width:18px;
height:18px;
font-size:12px;
display:none;
align-items:center;
justify-content:center;
}

.theme-btn.active span{
display:flex;
}

.yellow{background:#d4af37;}
.dark{background:#111;}
.blue{background:#2979ff;}
.pink{background:#ff2d8d;}
.orange{background:#ff7a00;}

</style>

</head>

<body>

<div class="container">

<div class="box">

<h2>Select Theme</h2>

<div class="theme-grid">

<button class="theme-btn yellow" onclick="setTheme('yellow',this)"><span>✔</span></button>
<button class="theme-btn dark" onclick="setTheme('dark',this)"><span>✔</span></button>
<button class="theme-btn blue" onclick="setTheme('blue',this)"><span>✔</span></button>
<button class="theme-btn pink" onclick="setTheme('pink',this)"><span>✔</span></button>
<button class="theme-btn orange" onclick="setTheme('orange',this)"><span>✔</span></button>

</div>

</div>

</div>

<script>

function setTheme(theme,btn){

localStorage.setItem("theme",theme)

document.querySelectorAll(".theme-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

applyTheme(theme)

}

function applyTheme(theme){

if(theme=="dark"){
document.body.style.background="#111"
document.body.style.color="#fff"
}
else if(theme=="blue"){
document.body.style.background="#e3f2fd"
}
else if(theme=="pink"){
document.body.style.background="#ffe4ec"
}
else if(theme=="orange"){
document.body.style.background="#fff3e0"
}
else{
document.body.style.background="#f4f4f4"
document.body.style.color="#000"
}

}

// load saved theme

let savedTheme=localStorage.getItem("theme")

if(savedTheme){

applyTheme(savedTheme)

document.querySelectorAll(".theme-btn").forEach(btn=>{
if(btn.classList.contains(savedTheme)){
btn.classList.add("active")
}
})

}

</script>

</body>
</html>
