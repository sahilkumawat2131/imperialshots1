<!DOCTYPE html>
<html>
<head>
<title>ImperialShots Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family:Poppins,Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
background:#007bff;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

.link{
text-align:center;
margin-top:15px;
cursor:pointer;
color:#007bff;
font-size:14px;
}

.timer{
text-align:center;
font-size:13px;
color:#666;
margin-top:5px;
}

.resend{
text-align:center;
font-size:13px;
color:#007bff;
cursor:pointer;
display:none;
}
/* ================= MOBILE RESPONSIVE ================= */

@media (max-width:768px){

body{
padding:20px;
align-items:flex-start;
}

.box{
width:100%;
max-width:380px;
padding:25px;
}

h2{
font-size:22px;
}

input{
padding:14px;
font-size:16px;
}

button{
padding:14px;
font-size:16px;
}

.link{
font-size:15px;
}

.timer{
font-size:14px;
}

.resend{
font-size:14px;
}

}
.logo-img{
    width:80px;  /* desktop */
    height:80px;
}

@media (max-width:768px){
    .logo-img{
        width:70px;  /* mobile thoda chhota */
        height:70px;
    }
}
body{
font-family:Poppins,Arial;
background:url("123.png") no-repeat center center/cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}
.poweredText{
text-align:center;
margin-top:45px;
font-size:12px;
color:#666;
}

.powered span{
font-weight:600;
color:#111;
}
.poweredText{
text-align:center;
font-size:12px;
color:#ccc;
}

.imp{
display:block;
color:#ffb6a3; /* peach color */
font-weight:bold;
}

.shots{
display:block;
color:#ffb6a3;
font-weight:bold;
margin-top:-3px; /* thoda close karega */
}


</style>

</head>

<body>

<div class="box">

<h2 id="title">Login</h2>

<div id="loginBox">

<input id="loginId" placeholder="User ID">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="showRegister()">Create Account</div>

</div>


<div id="registerBox" style="display:none">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email Address">

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" maxlength="6" placeholder="Enter 6 digit OTP">

<div class="timer" id="timer"></div>
<div class="resend" id="resendBtn" onclick="sendOTP()">Resend OTP</div>

<button onclick="verifyOTP()">Verify OTP</button>

<div class="link" onclick="showLogin()">Back to Login</div>

</div>
<p class="poweredText">
  Powered by 
  <span class="imp">Imperial</span>
  <span class="shots">Shots</span>
</p>
</div>

<script src="index.js"></script>

</body>
</html>
