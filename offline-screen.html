<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Offline - Imperial Shots</title>

<link rel="stylesheet" href="offine-screen.css">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

</head>

<body>

<div id="offlineScreen" class="hidden">

<lottie-player
class="animation"
src="https://assets5.lottiefiles.com/packages/lf20_x62chJ.json"
background="transparent"
speed="1"
loop
autoplay>
</lottie-player>

<div class="offline-text">

<h1>Oops!</h1>

<p>Your connection is lost</p>
<p>Please check your internet connection...</p>

<button class="retry-btn" onclick="retryConnection()">Retry</button>

</div>

</div>

<script src="offine-screen.js"></script>

</body>
</html>
